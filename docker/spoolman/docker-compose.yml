---
services:
  # ---------------------------------------------
  # Setup spoolman
  #
  # https://github.com/Donkie/Spoolman
  # ---------------------------------------------
  
  spoolman:
    image:          ghcr.io/donkie/spoolman:0.23.1
    container_name: spoolman
    restart:        unless-stopped
    
    ports:
      - "7912:8000"

    environment:
      TZ: ${ENV_TZ:?err}      

    volumes:
      - ./data/host/spoolman:/home/app/.local/share/spoolman
