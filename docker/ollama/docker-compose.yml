---
services:

  # ----------------------------------------
  # Setup Ollama
  #
  # https://hub.docker.com/r/ollama/ollama
  # ----------------------------------------
  ollama:
    image:          ollama/ollama:0.30.8
    container_name: ollama
    restart:        unless-stopped
       
    networks:
      frontend:

    environment:
      # Caps Ollama's iGPU memory to ~14GiB (LXC has 16GiB RAM, 2GiB headroom).
      # iGPU reports a fixed 70.5GiB pool on this host: 70.5 - 56.5 = 14GiB.
      # If LXC RAM changes, recalc: overhead = 70.5GiB - (new_RAM - 2GiB)
      - OLLAMA_GPU_OVERHEAD=60666911744  # 56.5GiB -> caps Ollama to ~14GiB
      - OLLAMA_KEEP_ALIVE=5m
      - OLLAMA_IGPU_ENABLE=1
      - OLLAMA_MODELS=/mnt/ollama/models
      - OLLAMA_MAX_LOADED_MODELS=1

    volumes:
       - ./data/host/ollama:/root/.ollama
       - /mnt/ollama/models:/mnt/ollama/models

      # Pass local timezone information to the container
      #- /etc/timezone:/etc/timezone:ro
      #- /etc/localtime:/etc/localtime:ro
    
    devices:
      - /dev/dri/card1:/dev/dri/card1
      - /dev/dri/renderD128:/dev/dri/renderD128

    ports:
       - "11434:11434"

  # ----------------------------------------
  # Setup Open WebUI
  #
  # https://github.com/open-webui/open-webui
  # ----------------------------------------
  open-webui:
    image:          ghcr.io/open-webui/open-webui:0.9.6
    container_name: open-webui
    restart:        unless-stopped

    networks:
      frontend:

    depends_on:
      - ollama
    
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      
      # Refer: https://integrations.goauthentik.io/miscellaneous/open-webui/
      - OAUTH_CLIENT_ID=${ENV_OPEN_WEBUI_OAUTH_CLIENT_ID:?oauth client id required}
      - OAUTH_CLIENT_SECRET=${ENV_OPEN_WEBUI_OAUTH_CLIENT_SECRET:?oauth client secret required}
      - OAUTH_PROVIDER_NAME=authentik
      - OPENID_PROVIDER_URL=https://authentik.max-lan.com/application/o/open-webui/.well-known/openid-configuration
      - OPENID_REDIRECT_URI=https://open-webui.max-lan.com/oauth/oidc/callback
      - WEBUI_URL=https://open-webui.max-lan.com
      # Allows auto-creation of new users using OAuth. Must be paired with ENABLE_LOGIN_FORM=false.
      #- ENABLE_OAUTH_SIGNUP=true
      # Disables user/password login form. Required when ENABLE_OAUTH_SIGNUP=true.
      #- ENABLE_LOGIN_FORM=false
      - OAUTH_MERGE_ACCOUNTS_BY_EMAIL=true

    volumes:
      - ./data/host/open-webui:/app/backend/data
    
      # Pass local timezone information to the container
      #- /etc/timezone:/etc/timezone:ro
      #- /etc/localtime:/etc/localtime:ro

    ports:
      - "3000:8080"

networks:
  frontend:
